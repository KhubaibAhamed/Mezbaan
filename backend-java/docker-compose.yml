version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mezbaan-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mezbaan_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mezbaan-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
